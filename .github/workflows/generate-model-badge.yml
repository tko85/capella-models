name: Generate Model Badge

on:
  push:
    branches: [ main ]
    paths:
      - 'tst/**'
  workflow_dispatch:

jobs:
  generate-model-badge:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate complexity badge
        run: |
          # Create a simple badge without parsing the model
          # This is a placeholder until we can properly parse the Capella model
          cat > model-badge.json <<EOF
          {
            "schemaVersion": 1,
            "label": "complexity",
            "message": "model loaded",
            "color": "green"
          }
          EOF
          
          echo "✓ Generated placeholder badge"
          cat model-badge.json
      
      - name: Upload badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-badge
          path: model-badge.json
          retention-days: 90

